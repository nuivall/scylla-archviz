<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScyllaDB Architecture Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    /* Light theme (default) — palette derived from scviz mascot */
    --bg: #f5f6f8;
    --bg-secondary: #ffffff;
    --bg-tertiary: #eaecf1;
    --border: #c9ced8;
    --text: #1a1d24;
    --text-muted: #5c6370;
    --accent: #4ab8c9;
    --glow: rgba(74,184,201,0.18);
    --shadow: rgba(0,0,0,0.06);
    --edge-color: #b8bfca;
    --edge-highlight: #4ab8c9;
    --text-shadow-node: 0 0 6px rgba(255,255,255,0.9);
    --node-fill-opacity: 0.18;
    --node-stroke-opacity: 0.85;
    --band-opacity: 0.04;
    --tier-label-opacity: 0.45;
    --guide-line-opacity: 0.08;
  }
  [data-theme="dark"] {
    --bg: #0c1017;
    --bg-secondary: #141a23;
    --bg-tertiary: #1c232e;
    --border: #2a3240;
    --text: #dde3ec;
    --text-muted: #7c8694;
    --accent: #5ccfdf;
    --glow: rgba(92,207,223,0.25);
    --shadow: rgba(0,0,0,0.3);
    --edge-color: #1e2530;
    --edge-highlight: #5ccfdf;
    --text-shadow-node: 0 0 8px rgba(0,0,0,0.8);
    --node-fill-opacity: 0.20;
    --node-stroke-opacity: 0.75;
    --band-opacity: 0.025;
    --tier-label-opacity: 0.3;
    --guide-line-opacity: 0.06;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    transition: background 0.3s, color 0.3s;
  }
  /* Header */
  .header {
    position: fixed; top:0; left:0; right:0; z-index:100;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; flex-wrap: nowrap; gap: 16px;
    padding: 10px 20px;
    backdrop-filter: blur(12px);
    transition: background 0.3s, border-color 0.3s;
  }
  .header h1 {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    background: linear-gradient(135deg, #4ab8c9, #5b5b8e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .header-logo {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 6px;
    margin-right: -8px;
    vertical-align: middle;
  }
  .search-box {
    position: relative;
    flex: 0 1 260px;
    margin-left: auto;
  }
  .search-box input {
    width: 100%;
    padding: 6px 28px 6px 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s, background 0.3s;
    font-family: inherit;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '\1F50D';
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    opacity: 0.5;
  }
  .search-clear {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    border-radius: 50%;
    padding: 0;
    display: none;
    transition: color 0.15s, background 0.15s;
  }
  .search-clear:hover { color: var(--text); background: var(--bg-tertiary); }
  .search-box.has-value .search-clear { display: block; }
  .stats {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* SVG area */
  svg {
    position: fixed;
    top: 48px; left: 0;
    width: 100%; height: calc(100vh - 48px);
  }

  /* Info Panel */
  .info-panel {
    position: fixed;
    top: 58px; left: 10px;
    width: 320px;
    max-height: calc(100vh - 68px);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    z-index: 90;
    overflow: hidden;
    opacity: 0;
    transform: translateX(-20px);
    transition: opacity 0.3s, transform 0.3s, background 0.3s, border-color 0.3s;
    pointer-events: none;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .info-panel.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
  }
  .info-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .info-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .info-header h2 {
    font-size: 14px; font-weight: 600; letter-spacing: -0.2px;
    flex: 1;
  }
  .info-close {
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    border: none; background: none;
    line-height: 1;
    font-family: inherit;
  }
  .info-close:hover { color: var(--text); }
  .info-body {
    padding: 12px 16px 16px;
    overflow-y: auto;
    max-height: calc(100vh - 140px);
    font-size: 12px;
    line-height: 1.6;
  }
  .info-body p {
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .info-body h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    color: var(--text-muted);
    margin: 12px 0 6px;
  }
  .dep-list {
    list-style: none;
  }
  .dep-list li {
    padding: 3px 0;
    font-size: 11px;
    font-weight: 450;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dep-list li[data-node-id] {
    cursor: pointer;
    border-radius: 4px;
    padding: 3px 4px;
    margin: 0 -4px;
    transition: background 0.15s;
  }
  .dep-list li[data-node-id]:hover {
    background: var(--bg-tertiary);
  }
  @keyframes node-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
  .node-blink rect {
    animation: node-blink 0.6s ease-in-out infinite;
  }
  .dep-list li .dep-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dep-type {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }
  .file-count {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  /* Right-hand side dependency detail panel */
  .dep-detail-panel {
    position: fixed;
    top: 58px; right: 10px;
    width: 340px;
    max-height: calc(100vh - 68px);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    z-index: 90;
    overflow: hidden;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 0.25s, transform 0.25s, background 0.3s, border-color 0.3s;
    pointer-events: none;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .dep-detail-panel.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
  }
  .dep-detail-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .dep-detail-header .dep-detail-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dep-detail-header h2 {
    font-size: 13px; font-weight: 600; letter-spacing: -0.2px;
    flex: 1;
    line-height: 1.3;
  }
  .dep-detail-body {
    padding: 12px 16px 16px;
    overflow-y: auto;
    max-height: calc(100vh - 140px);
    font-size: 12px;
    line-height: 1.6;
  }
  .dep-detail-body p {
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .dep-detail-body .dep-detail-type {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .dep-detail-body .dep-detail-strength {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-left: 4px;
  }
  .dep-detail-body h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    color: var(--text-muted);
    margin: 12px 0 6px;
  }
  .dep-detail-body .dep-desc-text {
    color: var(--text);
    font-size: 12px;
    line-height: 1.7;
  }

  .theme-toggle {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    color: var(--text);
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    background: var(--border);
  }

  /* Toolbar buttons */
  .tool-btn {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    line-height: 1;
    color: var(--text-muted);
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    flex-shrink: 0;
    white-space: nowrap;
    font-family: inherit;
  }
  .tool-btn:hover {
    background: var(--border);
    color: var(--text);
  }
  .tool-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .tool-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* Path finder cursor hint */
  .path-mode-hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-secondary);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text);
    z-index: 95;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    font-family: inherit;
  }
  .path-mode-hint.visible { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <img class="header-logo" src="data:image/svg+xml,%3Csvg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237dd4e0'/%3E%3Cstop offset='100%25' stop-color='%234ab8c9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M40 8C18 8 8 24 8 40c0 12 4 20 6 26l4 8 4-8 4 8 4-8 4 8 4-8 4 8 4-8 4 8 4-8 4 8 4-8c2-6 10-14 10-26C72 24 62 8 40 8z' fill='url(%23g)'/%3E%3Cellipse cx='34' cy='34' rx='12' ry='13' fill='white'/%3E%3Cellipse cx='37' cy='36' rx='6' ry='7' fill='%232d2d5e'/%3E%3Cpath d='M28 48Q34 54 44 48' stroke='%232d2d5e' stroke-width='2.5' fill='none' stroke-linecap='round'/%3E%3Crect x='52' y='28' width='8' height='36' rx='2' fill='%235b5b8e'/%3E%3Crect x='55' y='36' width='2' height='14' rx='1' fill='white' opacity='.7'/%3E%3Crect x='60' y='30' width='8' height='34' rx='2' fill='%23e8a83e'/%3E%3Crect x='63' y='38' width='2' height='14' rx='1' fill='white' opacity='.7'/%3E%3Crect x='68' y='28' width='8' height='36' rx='2' fill='%239e3b3b'/%3E%3Crect x='71' y='36' width='2' height='14' rx='1' fill='white' opacity='.7'/%3E%3C/svg%3E" alt="logo">
  <h1>ScyllaDB Architecture</h1>
  <div class="search-box">
    <input type="text" placeholder="Search services..." id="searchInput">
    <button class="search-clear" id="searchClear">&times;</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btnPath" title="Click two nodes to find shortest path">Path Finder</button>
  <div class="tool-sep"></div>
  <button class="theme-toggle" id="themeToggle" title="Toggle dark/light theme">&#9790;</button>
</div>

<div class="path-mode-hint" id="pathHint">Click a source node, then a target node</div>

<svg id="graph"></svg>

<div class="info-panel" id="infoPanel">
  <div class="info-header">
    <div class="info-dot" id="infoDot"></div>
    <h2 id="infoTitle"></h2>
    <button class="info-close" id="infoClose">&times;</button>
  </div>
  <div class="info-body" id="infoBody"></div>
</div>

<div class="dep-detail-panel" id="depDetailPanel">
  <div class="dep-detail-header">
    <div class="dep-detail-dot" id="depDetailDot"></div>
    <h2 id="depDetailTitle"></h2>
  </div>
  <div class="dep-detail-body" id="depDetailBody"></div>
</div>

<script>
// =============================================================================
// DATA
// =============================================================================

const LAYERS = {
  storage: { label: 'Storage Engine', color: '#d4903e' },
  cluster: { label: 'Cluster / P2P', color: '#5b5b8e' },
  services: { label: 'Core Services', color: '#4ab8c9' },
  query: { label: 'Query Layer', color: '#e8a83e' },
  api: { label: 'API / Protocol', color: '#9e3b3b' },
};

// ---- DEPENDENCY TYPE DATA ----
const DEP_TYPES = {
  ref: { label: 'Reference (&)', color: '#4ab8c9' },
  'sharded-ref': { label: 'Sharded ref', color: '#5b5b8e' },
  'raw-ptr': { label: 'Raw pointer (late-init)', color: '#d4903e' },
  'unique-ptr': { label: 'Unique pointer (owned)', color: '#e8a83e' },
  observer: { label: 'Observer/listener', color: '#2d2d5e' },
  'pluggable': { label: 'Pluggable (late-init)', color: '#9e3b3b' },
  'ctor-param': { label: 'Constructor param', color: '#6ec6d8' },
  'method-param': { label: 'Method param only', color: '#7c8694' },
};

// ---- CLASS-LEVEL DATA ----
// All peering_sharded_service / async_sharded_service classes in the ScyllaDB codebase

const classNodes = [
  // === STORAGE LAYER ===
  { id:'database', ns:'replica', layer:'storage', desc:'The local replica database: owns tables, memtables, commitlog, SSTable managers, view update generator.' },
  { id:'compaction_manager', ns:'compaction', layer:'storage', desc:'Manages compaction tasks across all tables, pluggable system_keyspace dependency.' },
  { id:'storage_manager', ns:'sstables', layer:'storage', desc:'SSTable storage lifecycle management: creation, deletion, object storage.' },
  { id:'sstable_compressor_factory', ns:'sstables', layer:'storage', desc:'Default SSTable compressor factory. No sharded service dependencies.' },
  { id:'system_keyspace', ns:'db', layer:'storage', desc:'System keyspace operations: local metadata, peer info, compaction history, Raft state.' },
  { id:'view_builder', ns:'db::view', layer:'storage', desc:'Materialized view builder: tracks pending views and coordinates build progress.' },
  { id:'view_building_worker', ns:'db::view', layer:'storage', desc:'View building worker: executes tasks scheduled by coordinator for building views.' },
  { id:'view_update_generator', ns:'db::view', layer:'storage', desc:'Generates materialized view updates from base table mutations.' },
  { id:'snapshot_ctl', ns:'db::snapshot', layer:'storage', desc:'Snapshot controller: manages table snapshots, backups, and snapshot lifecycle.' },
  { id:'batchlog_manager', ns:'db', layer:'storage', desc:'Manages batchlog replay for atomic batch writes across partitions.' },
  { id:'sstables_loader', ns:'', layer:'storage', desc:'Loads SSTables from external sources into the database.' },

  // === CLUSTER LAYER ===
  { id:'gossiper', ns:'gms', layer:'cluster', desc:'Gossip protocol engine: failure detection (Phi accrual), endpoint state distribution, cluster membership.' },
  { id:'messaging_service', ns:'netw', layer:'cluster', desc:'RPC transport layer: serialization, compression, connection pooling, verb routing between nodes.' },
  { id:'shared_token_metadata', ns:'locator', layer:'cluster', desc:'Shared token metadata: token-to-endpoint mapping, pending ranges, tablet metadata.' },
  { id:'erm_factory', ns:'locator', layer:'cluster', desc:'Effective replication map factory: creates and caches replication maps per strategy.' },
  { id:'feature_service', ns:'gms', layer:'cluster', desc:'Cluster feature flags: tracks supported features across nodes for safe rolling upgrades.' },
  { id:'snitch', ns:'locator', layer:'cluster', desc:'Endpoint snitch: provides datacenter/rack locality information for replication placement.' },
  { id:'stream_manager', ns:'streaming', layer:'cluster', desc:'Orchestrates bulk data transfer between nodes for repair, bootstrap, rebuild.' },
  { id:'repair_service', ns:'repair', layer:'cluster', desc:'Drives anti-entropy repair: hash comparison, streaming of differing ranges.' },
  { id:'failure_detector', ns:'direct_fd', layer:'cluster', desc:'Direct failure detector for node liveness. No sharded service dependencies.' },
  { id:'address_map', ns:'service', layer:'cluster', desc:'Maps host IDs to IP addresses. Used via gossip_address_map alias by gossiper, storage_service, and messaging_service.' },
  { id:'direct_fd_pinger', ns:'service', layer:'cluster', desc:'Pinger for direct failure detector, sending ping messages over messaging service.' },

  // === SERVICES LAYER ===
  { id:'storage_service', ns:'service', layer:'services', desc:'Central orchestrator for the node lifecycle: bootstrap, decommission, topology changes, schema agreement.' },
  { id:'storage_proxy', ns:'service', layer:'services', desc:'Coordinates reads/writes across replicas: consistency levels, read repair, speculative retry, hints.' },
  { id:'migration_manager', ns:'service', layer:'services', desc:'Manages schema migrations and propagation. Observes gossiper state changes.' },
  { id:'raft_group_registry', ns:'service', layer:'services', desc:'Raft group registry: manages Raft group 0 for strongly-consistent schema and topology operations.' },
  { id:'qos_controller', ns:'qos', layer:'services', desc:'Quality-of-service: maps users to service levels and scheduling groups.' },
  { id:'auth_service', ns:'auth', layer:'services', desc:'Authentication/authorization service: manages authenticators, authorizers, role managers.' },
  { id:'auth_cache', ns:'auth', layer:'services', desc:'Auth permission and role cache: caches role records and permissions from system tables.' },
  { id:'cdc_generation', ns:'cdc', layer:'services', desc:'CDC generation service: manages CDC stream generations tied to token ring changes.' },
  { id:'cdc_service', ns:'cdc', layer:'services', desc:'CDC service: listens for schema changes and manages CDC log tables.' },
  { id:'task_manager', ns:'tasks', layer:'services', desc:'Distributed task manager: tracks long-running operations (repair, compaction) across the cluster.' },
  { id:'cache_hitrate_calculator', ns:'service', layer:'services', desc:'Cache hit-rate calculator: periodically recalculates and publishes cache stats via gossip.' },
  { id:'paxos_store', ns:'service', layer:'services', desc:'Paxos state store: persists Paxos promise/proposal/decision state for LWT.' },
  { id:'view_update_backlog_broker', ns:'service', layer:'services', desc:'View update backlog broker: publishes view backlog info via gossip.' },
  { id:'tracing', ns:'tracing', layer:'services', desc:'Distributed request tracing infrastructure for recording and storing trace events.' },
  { id:'mapreduce_service', ns:'service', layer:'services', desc:'Map-reduce service for distributed aggregation queries.' },
  { id:'strong_coordinator', ns:'service::sc', layer:'services', desc:'Strong consistency coordinator for Raft-based operations.' },
  { id:'groups_manager', ns:'service::sc', layer:'services', desc:'Strong consistency groups manager for Raft group lifecycle.' },
  { id:'client_routes', ns:'service', layer:'services', desc:'Client routes service for CQL native transport routing.' },

  // === QUERY LAYER ===
  { id:'query_processor', ns:'cql3', layer:'query', desc:'CQL query processing pipeline: parsing, validation, optimization, execution.' },
  { id:'lang_manager', ns:'lang', layer:'query', desc:'UDF runtime manager: Lua and WebAssembly scripting. No sharded service dependencies.' },
  { id:'vector_store_client', ns:'vector_search', layer:'query', desc:'Vector similarity search client for ANN queries. No sharded service dependencies.' },

  // === API LAYER ===
  { id:'cql_server', ns:'transport', layer:'api', desc:'CQL protocol server: handles client connections, authentication, query dispatch.' },
  { id:'alternator_executor', ns:'alternator', layer:'api', desc:'DynamoDB-compatible request executor: translates and executes DynamoDB API operations.' },
  { id:'alternator_server', ns:'alternator', layer:'api', desc:'Alternator HTTP server: handles DynamoDB API requests and authentication.' },
  { id:'alternator_expiration', ns:'alternator', layer:'api', desc:'Alternator TTL expiration service: cleans up expired items in Alternator tables.' },
  { id:'audit', ns:'audit', layer:'api', desc:'Audit logging service with syslog and table-based storage backends.' },
];

// ---- DEPENDENCY DESCRIPTIONS (discovered from ScyllaDB source) ----
const DEP_DESCRIPTIONS = {
  // --- storage_service ---
  'storage_service->database->sharded-ref': 'Accesses the local database for schema lookups, table/keyspace metadata, configuration (ring_delay, cluster_name, num_tokens), applying mutations, draining during shutdown, invoking compaction operations, and finding column families for tablet operations.',
  'storage_service->gossiper->ref': 'Performs shadow rounds during join/replace, manages endpoint lifecycle (add/remove endpoints), advertises local application state (STATUS, TOKENS, SCHEMA), starts/stops gossiping, queries endpoint liveness, and resolves host IDs to IPs.',
  'storage_service->messaging_service->sharded-ref': 'Registers all RPC verb handlers (node_ops_cmd, raft_topology_cmd, tablet_stream/repair/cleanup, join_node RPCs), sends RPCs to other nodes, bans hosts at the messaging layer during topology changes, and manages preferred IP reconnection.',

// =============================================================================
// ENGINE
// =============================================================================

const svg = d3.select('#graph');
const width = window.innerWidth;
const height = window.innerHeight - 48;

let selectedNode = null;
let simulation = null;

// Analysis mode state
let analysisMode = null;    // null | 'path'
let pathSource = null;      // node id for path finder start
let pathTarget = null;      // node id for path finder end
let currentNodes = [];      // live references to rendered nodes
let currentEdges = [];      // live references to rendered edges
let currentNodeSel = null;  // d3 selection for nodes
let currentLinkSel = null;  // d3 selection for links

// Theme helpers — read CSS variables at runtime
function css(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

// Main group for zoom/pan
const container = svg.append('g');
const edgeGroup = container.append('g').attr('class', 'edges');
const nodeGroup = container.append('g').attr('class', 'nodes');

// Zoom behavior
const zoom = d3.zoom()
  .scaleExtent([0.15, 4])
  .on('zoom', (e) => container.attr('transform', e.transform));
svg.call(zoom);

// Arrow markers
const defs = svg.append('defs');

function createMarker(id, color) {
  defs.append('marker')
    .attr('id', id)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 10)
    .attr('refY', 0)
    .attr('markerWidth', 5)
    .attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L10,0L0,4')
    .attr('fill', color);
}

function rebuildMarkers() {
  defs.selectAll('marker').remove();
  createMarker('arrow-default', css('--edge-color'));
  createMarker('arrow-highlight', css('--edge-highlight'));
  Object.keys(DEP_TYPES).forEach(k => createMarker('arrow-dep-'+k, DEP_TYPES[k].color));
  createMarker('arrow-mutual', '#e53e3e');
}
rebuildMarkers();

// Glow filter
const glowFilter = defs.append('filter').attr('id', 'glow');
glowFilter.append('feGaussianBlur').attr('stdDeviation', 2.5).attr('result', 'blur');
glowFilter.append('feMerge').selectAll('feMergeNode')
  .data(['blur', 'SourceGraphic']).join('feMergeNode').attr('in', d => d);

const infoPanel = d3.select('#infoPanel');
const depDetailPanel = d3.select('#depDetailPanel');

// =============================================================================
// RENDER FUNCTIONS
// =============================================================================

function getNodeColor(node) {
  return LAYERS[node.layer]?.color || css('--text-muted');
}

// Edge visual weight helpers (global so analysis functions can access them)
function edgeStrokeWidth(s) {
  if (s <= 1) return 0.5;
  if (s <= 2) return 0.8;
  if (s <= 3) return 1.2;
  if (s <= 4) return 1.6;
  if (s <= 5) return 2.1;
  if (s <= 6) return 2.7;
  if (s <= 7) return 3.4;
  return 4.2;
}
function edgeDash(s, type) {
  if (type === 'raw-ptr' || type === 'pluggable' || type === 'method-param') {
    if (s <= 2) return '3,5';
    if (s <= 4) return '6,4';
    return '8,3';
  }
  if (s <= 1) return '2,5';
  if (s <= 2) return '4,4';
  if (s <= 3) return '8,3';
  if (s <= 4) return '12,3';
  return 'none';
}
function edgeOpacity(s) {
  return 0.15 + Math.min(s, 8) * 0.08;
}
function edgeColor(d) {
  if (d.mutual) return '#e53e3e';
  return DEP_TYPES[d.type]?.color || css('--edge-color');
}


function renderClassView() {
  edgeGroup.selectAll('*').remove();
  nodeGroup.selectAll('*').remove();
  if (simulation) simulation.stop();
  simulation = null;

  const nodes = classNodes.map(d => ({...d, radius: 28}));
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

  // Deduplicate edges (keep highest strength for duplicates with same source->target)
  const edgeMap = {};
  classEdges.forEach(([s,t,type,strength]) => {
    if (!nodeMap[s] || !nodeMap[t]) return;
    const key = s + '->' + t + '->' + type;
    if (!edgeMap[key] || edgeMap[key].strength < strength) {
      edgeMap[key] = { source: s, target: t, type, strength };
    }
  });
  const edges = Object.values(edgeMap);

  // Detect mutual (bidirectional) dependencies: A→B and B→A both exist
  const directedPairs = new Set();
  edges.forEach(e => directedPairs.add(e.source + '->' + e.target));
  edges.forEach(e => {
    e.mutual = directedPairs.has(e.target + '->' + e.source);
  });

  // Node sizes from in-degree
  const inDeg = {};
  edges.forEach(e => { inDeg[e.target] = (inDeg[e.target] || 0) + e.strength; });
  const maxIn = Math.max(1, ...Object.values(inDeg));
  nodes.forEach(n => {
    n.radius = 22 + ((inDeg[n.id] || 0) / maxIn) * 22;
  });

  // Compute pill half-widths based on text length
  nodes.forEach(n => {
    const textLen = n.id.replace(/_/g, ' ').length;
    n.pillW = Math.min(Math.max(n.radius * 1.4, textLen * 3.4 + 10), 80);
  });

  // --- LAYERED LAYOUT ---
  const cLayerOrder = ['storage','cluster','services','query','api'];
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - 48;

  // Tier Y positions: bottom = storage, top = api
  const usableH = svgH * 3;
  const tierCount = cLayerOrder.length;
  const tierSpacing = usableH / (tierCount + 1);
  const tierY = {};
  cLayerOrder.forEach((l, i) => {
    tierY[l] = usableH - tierSpacing * (i + 1);
  });

  // Group nodes by layer
  const layerGroups = {};
  cLayerOrder.forEach(l => { layerGroups[l] = []; });
  nodes.forEach(n => { if (layerGroups[n.layer]) layerGroups[n.layer].push(n); });

  // Sort nodes within each layer by connectivity (highest in center)
  const connectivity = {};
  edges.forEach(e => {
    connectivity[e.source] = (connectivity[e.source] || 0) + e.strength;
    connectivity[e.target] = (connectivity[e.target] || 0) + e.strength;
  });
  Object.keys(layerGroups).forEach(l => {
    const group = layerGroups[l];
    group.sort((a, b) => (connectivity[b.id] || 0) - (connectivity[a.id] || 0));
    const centered = [];
    group.forEach((n, i) => {
      if (i % 2 === 0) centered.push(n);
      else centered.unshift(n);
    });
    layerGroups[l] = centered;
  });

  // Assign X positions with adaptive spacing based on pill widths
  const usableW = svgW * 3;
  Object.keys(layerGroups).forEach(l => {
    const group = layerGroups[l];
    const count = group.length;
    if (count === 0) return;
    if (count === 1) { group[0].x = usableW / 2; group[0].y = tierY[group[0].layer]; group[0].tierY = tierY[group[0].layer]; return; }
    // Compute total span: sum of adjacent pill half-widths + gaps
    const gap = 20;
    let totalNeeded = 0;
    for (let i = 0; i < count - 1; i++) {
      totalNeeded += group[i].pillW + group[i + 1].pillW + gap;
    }
    // Scale down only if it exceeds usable width
    const sc = totalNeeded > usableW - 200 ? (usableW - 200) / totalNeeded : 1;
    const startX = (usableW - totalNeeded * sc) / 2;
    let xCursor = startX;
    group.forEach((n, i) => {
      if (i === 0) {
        n.x = xCursor;
      } else {
        xCursor += (group[i - 1].pillW + n.pillW + gap) * sc;
        n.x = xCursor;
      }
      n.y = tierY[n.layer];
      n.tierY = tierY[n.layer];
    });
  });

  // Draw tier background bands
  drawTierBands(cLayerOrder, tierY, usableW, tierSpacing);

  // Edges — 8-level visual weight based on usage count (strength 1-8)
  // Level 1-2: dotted, thin  |  3-4: dashed, medium  |  5-6: solid, medium  |  7-8: solid, bold
  const link = edgeGroup.selectAll('path')
    .data(edges)
    .join('path')
    .attr('fill', 'none')
    .attr('stroke', d => edgeColor(d))
    .attr('stroke-width', d => edgeStrokeWidth(d.strength))
    .attr('stroke-opacity', d => d.mutual ? 0.8 : edgeOpacity(d.strength))
    .attr('stroke-dasharray', d => edgeDash(d.strength, d.type))
    .attr('stroke-linecap', 'round')
    .attr('marker-end', d => d.mutual ? 'url(#arrow-mutual)' : 'url(#arrow-dep-' + d.type + ')');

  // Draw edges with bezier curves
  updateEdges(link, nodeMap);

  // Store global references for analysis functions
  currentNodes = nodes;
  currentEdges = edges;

  // Node groups
  const node = nodeGroup.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('cursor', 'pointer')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  // Store selections globally
  currentNodeSel = node;
  currentLinkSel = link;

  // Drag behavior (horizontal only in layered mode)
  node.call(d3.drag()
    .on('start', function(e, d) { d._dragging = true; })
    .on('drag', function(e, d) {
      d.x = e.x;
      d3.select(this).attr('transform', `translate(${d.x},${d.y})`);
      updateEdges(link, nodeMap);
    })
    .on('end', function(e, d) { d._dragging = false; })
  );

  // Node pill shape
  const cFillOp = parseFloat(css('--node-fill-opacity'));
  const cStrokeOp = parseFloat(css('--node-stroke-opacity'));
  const cTextShadow = css('--text-shadow-node');
  const cMuted = css('--text-muted');

  node.append('rect')
    .attr('x', d => -d.pillW)
    .attr('y', d => -d.radius * 0.65)
    .attr('width', d => d.pillW * 2)
    .attr('height', d => d.radius * 1.3)
    .attr('rx', d => d.radius * 0.45)
    .attr('fill', d => getNodeColor(d))
    .attr('fill-opacity', cFillOp)
    .attr('stroke', d => getNodeColor(d))
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', cStrokeOp)
    .style('filter', 'url(#glow)')
    .style('transition', 'fill-opacity 0.3s, stroke-opacity 0.3s');

  // Class name
  node.append('text')
    .text(d => d.id.replace(/_/g, ' '))
    .attr('text-anchor', 'middle')
    .attr('dy', '-0.1em')
    .attr('fill', d => getNodeColor(d))
    .attr('font-size', d => Math.max(8.5, Math.min(11, d.radius * 0.35)))
    .attr('font-weight', 600)
    .attr('pointer-events', 'none')
    .style('text-shadow', cTextShadow);

  // Namespace
  node.append('text')
    .text(d => d.ns)
    .attr('text-anchor', 'middle')
    .attr('dy', '1.15em')
    .attr('fill', cMuted)
    .attr('font-size', d => Math.max(8, Math.min(10, d.radius * 0.3)))
    .attr('pointer-events', 'none');

  // Interactivity
  node.on('mouseover', (e, d) => {
    if (selectedNode || analysisMode) return;
    highlightClassNode(d, nodes, edges, node, link);
  }).on('mouseout', () => {
    if (selectedNode || analysisMode) return;
    resetClassHighlight(node, link);
  }).on('click', (e, d) => {
    e.stopPropagation();

    // Path finder mode
    if (analysisMode === 'path') {
      if (!pathSource) {
        pathSource = d.id;
        // Highlight source node
        node.select('rect')
          .attr('stroke-width', n => n.id === d.id ? 3.5 : 1.5)
          .attr('stroke', n => n.id === d.id ? css('--accent') : getNodeColor(n));
        document.getElementById('pathHint').textContent = 'Now click the target node';
        return;
      } else if (d.id !== pathSource) {
        pathTarget = d.id;
        selectedNode = d.id;
        applyPathHighlight(pathSource, pathTarget);
        document.getElementById('pathHint').classList.remove('visible');
        return;
      }
      return;
    }

    // Normal click behavior
    if (selectedNode === d.id) { selectedNode = null; resetClassHighlight(node, link); hideInfoPanel(); return; }
    selectedNode = d.id;
    highlightClassNode(d, nodes, edges, node, link);
    showClassInfo(d, edges);
  });

  svg.on('click', () => {
    if (analysisMode) {
      clearAnalysis();
      hideInfoPanel();
      return;
    }
    selectedNode = null;
    resetClassHighlight(node, link);
    hideInfoPanel();
  });

  // Auto-fit
  zoomToFit(nodes, 100);

  d3.select('#stats').text(nodes.length + ' classes, ' + edges.length + ' dependencies');
}


// =============================================================================
// LAYERED LAYOUT HELPERS
// =============================================================================

// Background group for tier bands (inserted before edges)
const tierGroup = container.insert('g', ':first-child').attr('class', 'tiers');

function drawTierBands(layerOrder, tierY, usableW, tierSpacing) {
  tierGroup.selectAll('*').remove();

  const bandOp = parseFloat(css('--band-opacity'));
  const tierLabelOp = parseFloat(css('--tier-label-opacity'));
  const guideOp = parseFloat(css('--guide-line-opacity'));

  layerOrder.forEach((l, i) => {
    const y = tierY[l];
    const bandH = tierSpacing * 0.85;

    // Subtle background band
    tierGroup.append('rect')
      .attr('x', -500)
      .attr('y', y - bandH / 2)
      .attr('width', usableW + 1000)
      .attr('height', bandH)
      .attr('fill', LAYERS[l]?.color || css('--text-muted'))
      .attr('fill-opacity', bandOp)
      .attr('rx', 8);

    // Tier label on the left side (positioned relative to node area)
    tierGroup.append('text')
      .text(LAYERS[l]?.label || l)
      .attr('x', usableW / 2)
      .attr('y', y - bandH / 2 + 18)
      .attr('text-anchor', 'middle')
      .attr('fill', LAYERS[l]?.color || css('--text-muted'))
      .attr('fill-opacity', tierLabelOp)
      .attr('font-size', 13)
      .attr('font-weight', 700)
      .attr('letter-spacing', '1px')
      .attr('pointer-events', 'none');

    // Horizontal guide line
    tierGroup.append('line')
      .attr('x1', -500)
      .attr('x2', usableW + 1000)
      .attr('y1', y)
      .attr('y2', y)
      .attr('stroke', LAYERS[l]?.color || css('--text-muted'))
      .attr('stroke-opacity', guideOp)
      .attr('stroke-width', 1)
      .attr('stroke-dasharray', '6,8');
  });
}

function updateEdges(linkSelection, nodeMap) {
  linkSelection.attr('d', d => {
    const src = typeof d.source === 'object' ? d.source : nodeMap[d.source];
    const tgt = typeof d.target === 'object' ? d.target : nodeMap[d.target];
    if (!src || !tgt) return '';
    const sx = src.x, sy = src.y;
    const tx = tgt.x, ty = tgt.y;
    const dy = ty - sy;
    const dx = tx - sx;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return '';

    // Offset start/end by node radius so edges start/end at boundary
    const srcR = src.pillW || src.radius || 20;
    const tgtR = tgt.pillW || tgt.radius || 20;

    // For same-tier edges, use a raised arc
    if (Math.abs(dy) < 10) {
      const arc = Math.max(40, Math.abs(dx) * 0.35);
      // Start and end from top of node
      const sy0 = sy - (src.radius || 20) * 0.6;
      const ty0 = ty - (tgt.radius || 20) * 0.6;
      return `M${sx},${sy0} C${sx},${sy0 - arc} ${tx},${ty0 - arc} ${tx},${ty0}`;
    }

    // Vertical direction: if target is below source, edge exits bottom and enters top
    const goingDown = dy > 0;
    const srcRy = (src.radius || 20) * 0.65;
    const tgtRy = (tgt.radius || 20) * 0.65;
    const sy0 = goingDown ? sy + srcRy : sy - srcRy;
    const ty0 = goingDown ? ty - tgtRy : ty + tgtRy;
    const effDy = ty0 - sy0;

    // Vertical bezier: control points at 40% of the vertical distance
    const cp = Math.abs(effDy) * 0.4;
    return `M${sx},${sy0} C${sx},${sy0 + Math.sign(effDy) * cp} ${tx},${ty0 - Math.sign(effDy) * cp} ${tx},${ty0}`;
  });
}


// =============================================================================
// ZOOM TO FIT
// =============================================================================

function zoomToFit(nodes, padding) {
  if (!nodes.length) return;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  nodes.forEach(n => {
    const r = (n.pillW || n.radius || 30) + 20;
    if (n.x - r < x0) x0 = n.x - r;
    if (n.y - r < y0) y0 = n.y - r;
    if (n.x + r > x1) x1 = n.x + r;
    if (n.y + r > y1) y1 = n.y + r;
  });
  const bw = x1 - x0;
  const bh = y1 - y0;
  if (bw <= 0 || bh <= 0) return;
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - 48;
  const scale = Math.min((svgW - padding * 2) / bw, (svgH - padding * 2) / bh, 1.5);
  const cx = (x0 + x1) / 2;
  const cy = (y0 + y1) / 2;
  const tx = svgW / 2 - cx * scale;
  const ty = svgH / 2 - cy * scale;
  svg.transition().duration(800).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function panToNode(d) {
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - 48;
  // Get current zoom scale, keep it (but clamp to a reasonable minimum)
  const curTransform = d3.zoomTransform(svg.node());
  const scale = Math.max(curTransform.k, 0.6);
  // Offset x to account for info panel (~300px on left)
  const panelOffset = infoPanel.classed('visible') ? 150 : 0;
  const tx = (svgW / 2 + panelOffset) - d.x * scale;
  const ty = svgH / 2 - d.y * scale;
  svg.transition().duration(500).ease(d3.easeCubicOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function selectNode(nodeId) {
  if (!currentNodes || !currentEdges) return;
  const d = currentNodes.find(n => n.id === nodeId);
  if (!d) return;
  selectedNode = d.id;
  highlightClassNode(d, currentNodes, currentEdges, currentNodeSel, currentLinkSel);
  showClassInfo(d, currentEdges);
  panToNode(d);
}


// =============================================================================
// HIGHLIGHT
// =============================================================================

function highlightClassNode(d, nodes, edges, nodeSelection, linkSelection) {
  const connected = new Set();
  connected.add(d.id);
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });

  nodeSelection.select('rect')
    .attr('fill-opacity', n => connected.has(n.id) ? 0.2 : 0.02)
    .attr('stroke-opacity', n => connected.has(n.id) ? 1 : 0.1)
    .attr('stroke-width', n => n.id === d.id ? 3 : connected.has(n.id) ? 2 : 1);
  nodeSelection.selectAll('text')
    .attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.1);

  linkSelection
    .attr('stroke-opacity', e => {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      if (sid === d.id || tid === d.id) return 0.85;
      return 0.03;
    });
}

function resetClassHighlight(nodeSelection, linkSelection) {
  const fillOp = parseFloat(css('--node-fill-opacity'));
  const strokeOp = parseFloat(css('--node-stroke-opacity'));
  nodeSelection.select('rect')
    .attr('fill-opacity', fillOp)
    .attr('stroke-opacity', strokeOp)
    .attr('stroke-width', 1.5);
  nodeSelection.selectAll('text').attr('fill-opacity', 1);
  linkSelection.attr('stroke-opacity', d => d.mutual ? 0.8 : (0.15 + Math.min(d.strength, 8) * 0.08));
}


// =============================================================================
// TOOLTIPS / INFO PANEL
// =============================================================================

function hideInfoPanel() { infoPanel.classed('visible', false); depDetailPanel.classed('visible', false); }

function showClassInfo(d, edges) {
  d3.select('#infoDot').style('background', getNodeColor(d));
  d3.select('#infoTitle').text(d.ns + '::' + d.id);

  const outEdges = edges.filter(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    return sid === d.id;
  }).sort((a,b) => b.strength - a.strength);
  const inEdges = edges.filter(e => {
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    return tid === d.id;
  }).sort((a,b) => b.strength - a.strength);

  const nodeMap = Object.fromEntries(classNodes.map(n => [n.id, n]));
  const muted = css('--text-muted');

  let html = '<p>' + d.desc + '</p>';

  if (outEdges.length) {
    html += '<h3>Depends on (' + outEdges.length + ')</h3><ul class="dep-list">';
    outEdges.forEach(e => {
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      const tn = nodeMap[tid];
      const c = DEP_TYPES[e.type]?.color || muted;
      const tLabel = tn ? tn.ns + '::' + tid : tid;
      const depKey = d.id + '->' + tid + '->' + e.type;
      html += '<li data-node-id="'+tid+'" data-dep-key="'+depKey+'" data-dep-strength="'+e.strength+'" data-dep-dir="out"><span class="dep-dot" style="background:'+c+'"></span>' + tLabel + ' <span class="dep-type">' + e.type + '</span></li>';
    });
    html += '</ul>';
  }
  if (inEdges.length) {
    html += '<h3>Depended on by (' + inEdges.length + ')</h3><ul class="dep-list">';
    inEdges.forEach(e => {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const sn = nodeMap[sid];
      const c = DEP_TYPES[e.type]?.color || muted;
      const sLabel = sn ? sn.ns + '::' + sid : sid;
      const depKey = sid + '->' + d.id + '->' + e.type;
      html += '<li data-node-id="'+sid+'" data-dep-key="'+depKey+'" data-dep-strength="'+e.strength+'" data-dep-dir="in"><span class="dep-dot" style="background:'+c+'"></span>' + sLabel + ' <span class="dep-type">' + e.type + '</span></li>';
    });
    html += '</ul>';
  }

  d3.select('#infoBody').html(html);
  infoPanel.classed('visible', true);
}


// =============================================================================
// GRAPH ALGORITHMS
// =============================================================================

// BFS shortest directed path from src to dst
function bfsPath(srcId, dstId, edges) {
  const adj = {};
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (!adj[sid]) adj[sid] = [];
    adj[sid].push(tid);
  });
  const visited = new Set([srcId]);
  const parent = {};
  const queue = [srcId];
  while (queue.length) {
    const cur = queue.shift();
    if (cur === dstId) {
      // reconstruct
      const path = [];
      let n = dstId;
      while (n !== srcId) {
        path.unshift(n);
        n = parent[n];
      }
      path.unshift(srcId);
      return path;
    }
    (adj[cur] || []).forEach(nb => {
      if (!visited.has(nb)) {
        visited.add(nb);
        parent[nb] = cur;
        queue.push(nb);
      }
    });
  }
  return null; // no path
}


// =============================================================================
// ANALYSIS HIGHLIGHT FUNCTIONS
// =============================================================================

function applyPathHighlight(srcId, dstId) {
  if (!currentNodeSel || !currentLinkSel) return;
  const path = bfsPath(srcId, dstId, currentEdges);

  if (!path) {
    d3.select('#infoDot').style('background', css('--accent'));
    d3.select('#infoTitle').text('Path Finder');
    d3.select('#infoBody').html('<p>No directed path found from <strong>' + srcId.replace(/_/g,' ') + '</strong> to <strong>' + dstId.replace(/_/g,' ') + '</strong>.</p>');
    infoPanel.classed('visible', true);
    return;
  }

  const pathSet = new Set(path);
  const pathEdges = new Set();
  for (let i = 0; i < path.length - 1; i++) {
    pathEdges.add(path[i] + '->' + path[i+1]);
  }

  const accentColor = css('--accent');

  currentNodeSel.select('rect')
    .attr('fill-opacity', n => pathSet.has(n.id) ? 0.25 : 0.02)
    .attr('stroke-opacity', n => pathSet.has(n.id) ? 1 : 0.08)
    .attr('stroke-width', n => {
      if (n.id === srcId || n.id === dstId) return 3.5;
      if (pathSet.has(n.id)) return 2.5;
      return 1;
    })
    .attr('stroke', n => {
      if (pathSet.has(n.id)) return accentColor;
      return getNodeColor(n);
    });

  currentNodeSel.selectAll('text')
    .attr('fill-opacity', n => pathSet.has(n.id) ? 1 : 0.08);

  currentLinkSel.attr('stroke-opacity', e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (pathEdges.has(sid + '->' + tid)) return 0.9;
    return 0.02;
  }).attr('stroke', e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (pathEdges.has(sid + '->' + tid)) return accentColor;
    return edgeColor(e);
  }).attr('stroke-width', e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (pathEdges.has(sid + '->' + tid)) return 3;
    return edgeStrokeWidth(e.strength);
  });

  // Info panel
  d3.select('#infoDot').style('background', accentColor);
  d3.select('#infoTitle').text('Shortest Path');
  let html = '<p>' + (path.length - 1) + ' hop' + (path.length - 1 !== 1 ? 's' : '') + ' from <strong>' + srcId.replace(/_/g,' ') + '</strong> to <strong>' + dstId.replace(/_/g,' ') + '</strong>.</p>';
  html += '<h3>Path</h3><ul class="dep-list">';
  path.forEach((id, i) => {
    const n = classNodes.find(cn => cn.id === id);
    const c = n ? getNodeColor(n) : css('--text-muted');
    html += '<li><span class="dep-dot" style="background:'+c+'"></span>' + (n ? n.ns + '::' : '') + id;
    if (i < path.length - 1) html += ' <span class="dep-type" style="margin-left:auto">&rarr;</span>';
    html += '</li>';
  });
  html += '</ul>';
  d3.select('#infoBody').html(html);
  infoPanel.classed('visible', true);
}

function clearAnalysis() {
  analysisMode = null;
  pathSource = null;
  pathTarget = null;
  document.getElementById('btnPath').classList.remove('active');
  document.getElementById('pathHint').classList.remove('visible');
  // Reset highlights
  if (currentNodeSel && currentLinkSel) {
    resetClassHighlight(currentNodeSel, currentLinkSel);
    // Restore original edge strokes
    currentLinkSel.attr('stroke', d => edgeColor(d))
      .attr('stroke-width', d => edgeStrokeWidth(d.strength));
    currentNodeSel.select('rect').attr('stroke', d => getNodeColor(d));
  }
}


// =============================================================================
// TOOLBAR BUTTONS
// =============================================================================

// Path finder toggle
document.getElementById('btnPath').addEventListener('click', () => {
  if (analysisMode === 'path') {
    clearAnalysis();
    hideInfoPanel();
    return;
  }
  clearAnalysis();
  analysisMode = 'path';
  pathSource = null;
  pathTarget = null;
  document.getElementById('btnPath').classList.add('active');
  document.getElementById('pathHint').textContent = 'Click a source node, then a target node';
  document.getElementById('pathHint').classList.add('visible');
});


// =============================================================================
// TABS + SEARCH + KEYS
// =============================================================================

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  e.target.closest('.search-box').classList.toggle('has-value', q.length > 0);
  if (!q) {
    nodeGroup.selectAll('g').style('opacity', 1);
    edgeGroup.selectAll('path').style('opacity', 1);
    return;
  }
  nodeGroup.selectAll('g').style('opacity', function(d) {
    const match = d.id.toLowerCase().includes(q) || (d.ns || '').toLowerCase().includes(q) || (d.desc || '').toLowerCase().includes(q);
    return match ? 1 : 0.08;
  });
  edgeGroup.selectAll('path').style('opacity', 0.05);
});

document.getElementById('searchClear').addEventListener('click', () => {
  const input = document.getElementById('searchInput');
  input.value = '';
  input.closest('.search-box').classList.remove('has-value');
  input.focus();
  nodeGroup.selectAll('g').style('opacity', 1);
  edgeGroup.selectAll('path').style('opacity', 1);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    clearAnalysis();
    selectedNode = null;
    hideInfoPanel();
    nodeGroup.selectAll('g').style('opacity', 1);
    edgeGroup.selectAll('path').style('opacity', 1);
    document.getElementById('searchInput').value = '';
    document.querySelector('.search-box').classList.remove('has-value');
    if (currentNodeSel && currentLinkSel) {
      resetClassHighlight(currentNodeSel, currentLinkSel);
      // Restore original edge strokes
      currentLinkSel.attr('stroke', d => edgeColor(d))
        .attr('stroke-width', d => edgeStrokeWidth(d.strength));
      currentNodeSel.select('rect').attr('stroke', d => getNodeColor(d));
    }
  }
});

document.getElementById('infoClose').addEventListener('click', () => {
  clearAnalysis();
  selectedNode = null;
  hideInfoPanel();
  if (currentNodeSel && currentLinkSel) {
    resetClassHighlight(currentNodeSel, currentLinkSel);
    currentLinkSel.attr('stroke', d => edgeColor(d))
      .attr('stroke-width', d => edgeStrokeWidth(d.strength));
    currentNodeSel.select('rect').attr('stroke', d => getNodeColor(d));
  }
});

// Clickable dependency items in info panel
document.getElementById('infoBody').addEventListener('click', (e) => {
  const li = e.target.closest('li[data-node-id]');
  if (!li) return;
  e.stopPropagation();
  const nodeId = li.getAttribute('data-node-id');
  if (nodeId) selectNode(nodeId);
});

// Hover on dependency items to show detail in right panel
document.getElementById('infoBody').addEventListener('mouseover', (e) => {
  const li = e.target.closest('li[data-dep-key]');
  if (!li) return;
  const depKey = li.getAttribute('data-dep-key');
  const depStrength = li.getAttribute('data-dep-strength');
  const depDir = li.getAttribute('data-dep-dir');
  if (!depKey) return;

  // Blink the dependency node on the graph
  const depNodeId = li.getAttribute('data-node-id');
  if (depNodeId && currentNodeSel) {
    currentNodeSel.classed('node-blink', false);
    currentNodeSel.filter(d => d.id === depNodeId).classed('node-blink', true);
  }

  const parts = depKey.split('->');
  if (parts.length < 3) return;
  const srcId = parts[0];
  const tgtId = parts[1];
  const depType = parts[2];

  const nodeMap = Object.fromEntries(classNodes.map(n => [n.id, n]));
  const srcNode = nodeMap[srcId];
  const tgtNode = nodeMap[tgtId];
  const depInfo = DEP_TYPES[depType];
  const depColor = depInfo?.color || css('--text-muted');

  // Build title
  const srcLabel = srcNode ? srcNode.ns + '::' + srcId : srcId;
  const tgtLabel = tgtNode ? tgtNode.ns + '::' + tgtId : tgtId;

  document.getElementById('depDetailDot').style.background = depColor;
  document.getElementById('depDetailTitle').textContent = srcLabel + ' \u2192 ' + tgtLabel;

  let bodyHtml = '';
  bodyHtml += '<span class="dep-detail-type" style="border:1px solid '+depColor+'">' + (depInfo?.label || depType) + '</span>';
  bodyHtml += '<span class="dep-detail-strength">strength: ' + depStrength + '/8</span>';

  // Look up description
  const desc = DEP_DESCRIPTIONS[depKey];
  if (desc) {
    bodyHtml += '<h3>How it\'s used</h3>';
    bodyHtml += '<p class="dep-desc-text">' + desc + '</p>';
  } else {
    bodyHtml += '<h3>Details</h3>';
    bodyHtml += '<p class="dep-desc-text" style="color:var(--text-muted);font-style:italic">No source-level description available for this dependency.</p>';
  }

  document.getElementById('depDetailBody').innerHTML = bodyHtml;
  depDetailPanel.classed('visible', true);
});

document.getElementById('infoBody').addEventListener('mouseout', (e) => {
  // Check if we're leaving the infoBody entirely or moving to a non-dep item
  const related = e.relatedTarget;
  if (related && related.closest && related.closest('#infoBody li[data-dep-key]')) return;
  depDetailPanel.classed('visible', false);
  // Stop blinking
  if (currentNodeSel) currentNodeSel.classed('node-blink', false);
});

// Handle resize
window.addEventListener('resize', () => {
  clearAnalysis();
  selectedNode = null;
  hideInfoPanel();
  renderClassView();
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  if (isDark) {
    delete html.dataset.theme;
    document.getElementById('themeToggle').innerHTML = '&#9790;'; // crescent moon
  } else {
    html.dataset.theme = 'dark';
    document.getElementById('themeToggle').innerHTML = '&#9788;'; // sun
  }
  rebuildMarkers();
  clearAnalysis();
  selectedNode = null;
  hideInfoPanel();
  renderClassView();
});

// Initial render
renderClassView();
