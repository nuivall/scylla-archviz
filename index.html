<style>
  :root {
    /* Light theme (default) — palette derived from scviz mascot */
    --bg: #f5f6f8;
    --bg-secondary: #ffffff;
    --bg-tertiary: #eaecf1;
    --border: #c9ced8;
    --text: #1a1d24;
    --text-muted: #5c6370;
    --accent: #4ab8c9;
    --accent-btn: #557da4;
    --glow: rgba(74,184,201,0.18);
    --glow-btn: rgba(85,125,164,0.22);
    --shadow: rgba(0,0,0,0.06);
    --edge-color: #b8bfca;
    --edge-highlight: #4ab8c9;
    --text-shadow-node: 0 0 6px rgba(255,255,255,0.9);
    --node-fill-opacity: 0.18;
    --node-stroke-opacity: 0.85;
    --band-opacity: 0.04;
    --tier-label-opacity: 0.45;
    --guide-line-opacity: 0.08;
  }
  [data-theme="dark"] {
    /* Dracula theme */
    --bg: #282a36;
    --bg-secondary: #21222c;
    --bg-tertiary: #44475a;
    --border: #6272a4;
    --text: #f8f8f2;
    --text-muted: #6272a4;
    --accent: #8be9fd;
    --accent-btn: #bd93f9;
    --glow: rgba(139,233,253,0.25);
    --glow-btn: rgba(189,147,249,0.3);
    --shadow: rgba(0,0,0,0.5);
    --edge-color: #44475a;
    --edge-highlight: #8be9fd;
    --text-shadow-node: 0 0 8px rgba(40,42,54,0.9);
    --node-fill-opacity: 0.20;
    --node-stroke-opacity: 0.75;
    --band-opacity: 0.06;
    --tier-label-opacity: 0.4;
    --guide-line-opacity: 0.08;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    transition: background 0.3s, color 0.3s;
  }
  /* Header */
  .header {
    position: fixed; top:0; left:0; right:0; z-index:100;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; flex-wrap: nowrap; gap: 16px;
    padding: 10px 20px;
    backdrop-filter: blur(12px);
    transition: background 0.3s, border-color 0.3s;
  }
  .header h1 {
    font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
    background: linear-gradient(135deg, #4ab8c9, #5b5b8e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .header-logo {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 6px;
    margin-right: -8px;
    vertical-align: middle;
  }
  .search-box {
    position: relative;
    flex: 0 1 260px;
  }
  .search-box input {
    width: 100%;
    padding: 7px 30px 7px 34px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s, background 0.3s, box-shadow 0.2s;
    font-family: inherit;
    box-shadow: 0 1px 2px var(--shadow);
  }
  .search-box input:focus { border-color: var(--accent-btn); box-shadow: 0 1px 6px var(--glow-btn); }
  .search-box::before {
    content: '\1F50D';
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.5;
  }
  .search-clear {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 17px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    border-radius: 50%;
    padding: 0;
    display: none;
    transition: color 0.15s, background 0.15s;
  }
  .search-clear:hover { color: var(--text); background: var(--bg-tertiary); }
  .search-box.has-value .search-clear { display: block; }
  .stats {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-left: auto;
  }

  /* SVG area */
  svg {
    position: fixed;
    top: 52px; left: 0;
    width: 100%; height: calc(100vh - 52px);
  }

  /* Info Panel */
  .info-panel {
    position: fixed;
    top: 62px; left: 10px;
    width: 320px;
    max-height: calc(100vh - 72px);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    z-index: 90;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .info-panel.visible {
    opacity: 1;
    pointer-events: all;
  }
  .info-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .info-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .info-header h2 {
    font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
    flex: 1;
  }
  .info-close {
    cursor: pointer;
    color: var(--text-muted);
    font-size: 22px;
    border: none; background: none;
    line-height: 1;
    padding: 4px;
    font-family: inherit;
  }
  .info-close:hover { color: var(--text); }
  .info-body {
    padding: 12px 16px 16px;
    overflow-y: auto;
    max-height: calc(100vh - 140px);
    font-size: 13px;
    line-height: 1.6;
  }
  .info-body p {
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .info-body h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    color: var(--text-muted);
    margin: 12px 0 6px;
  }
  .dep-list {
    list-style: none;
  }
  .dep-list li {
    padding: 3px 0;
    font-size: 12px;
    font-weight: 450;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dep-list li[data-node-id] {
    cursor: pointer;
    border-radius: 4px;
    padding: 3px 4px;
    margin: 0 -4px;
    transition: background 0.15s;
  }
  .dep-list li[data-node-id]:hover {
    background: var(--bg-tertiary);
  }
  .diff-go-to-code:hover {
    opacity: 0.75;
    text-decoration: underline !important;
  }
  .node-blink rect {
    filter: brightness(1.5) drop-shadow(0 0 6px currentColor);
  }
  .dep-list li .dep-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dep-type {
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }
  .file-count {
    display: inline-block;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  /* Right-hand side dependency detail panel */
  .dep-detail-panel {
    position: fixed;
    top: 58px; right: 10px;
    width: 340px;
    max-height: calc(100vh - 68px);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    z-index: 90;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .dep-detail-panel.visible {
    opacity: 1;
    pointer-events: all;
  }
  .dep-detail-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .dep-detail-header .dep-detail-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dep-detail-header h2 {
    font-size: 14px; font-weight: 600; letter-spacing: -0.2px;
    flex: 1;
    line-height: 1.3;
  }
  .dep-detail-body {
    padding: 12px 16px 16px;
    overflow-y: auto;
    max-height: calc(100vh - 140px);
    font-size: 13px;
    line-height: 1.6;
  }
  .dep-detail-body p {
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .dep-detail-body .dep-detail-type {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .dep-detail-body .dep-detail-strength {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-left: 4px;
  }
  .dep-detail-body h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    color: var(--text-muted);
    margin: 12px 0 6px;
  }
  .dep-detail-body .dep-desc-text {
    color: var(--text);
    font-size: 13px;
    line-height: 1.7;
  }

  .theme-toggle {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 11px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    color: var(--text-muted);
    transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
    box-shadow: 0 1px 2px var(--shadow);
  }
  .theme-toggle:hover {
    background: var(--bg);
    border-color: var(--accent-btn);
    color: var(--text);
    box-shadow: 0 1px 6px var(--glow-btn);
  }

  /* Toolbar buttons */
  .tool-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    color: var(--text-muted);
    transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
    white-space: nowrap;
    font-family: inherit;
    box-shadow: 0 1px 2px var(--shadow);
  }
  .tool-btn:hover {
    background: var(--bg-tertiary);
    border-color: var(--accent-btn);
    color: var(--text);
    box-shadow: 0 1px 6px var(--glow-btn);
  }
  .tool-btn.active {
    background: var(--accent-btn);
    border-color: var(--accent-btn);
    color: #fff;
    box-shadow: 0 1px 8px var(--glow-btn);
  }
  .tool-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
    opacity: 0.6;
  }


   /* Top-level view tabs */
   .view-tabs {
     display: flex;
     gap: 0;
     border: 1px solid var(--border);
     border-radius: 10px;
     overflow: hidden;
     flex-shrink: 0;
     box-shadow: 0 1px 2px var(--shadow);
   }
   .view-tab {
     padding: 7px 15px;
     font-size: 13px;
     font-weight: 500;
     cursor: pointer;
     background: var(--bg);
     color: var(--text-muted);
     border: none;
     font-family: inherit;
     transition: background 0.2s, color 0.2s, box-shadow 0.2s;
     white-space: nowrap;
   }
   .view-tab:not(:last-child) {
     border-right: 1px solid var(--border);
   }
   .view-tab:hover {
     color: var(--text);
     background: var(--bg-tertiary);
   }
   .view-tab.active {
     background: var(--accent-btn);
     color: #fff;
     box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
   }

   /* Context toolbars — arch and diff share the same space */
   .context-toolbar {
     display: flex;
     align-items: center;
     gap: 10px;
     flex: 1;
     min-width: 0;
   }
   .diff-level-tabs {
     flex-shrink: 0;
   }

   /* Diff overlay styles */
   .diff-info-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(34,197,94,0.12);
    color: #22c55e;
    border: 1px solid rgba(34,197,94,0.3);
    margin-bottom: 0;
    margin-right: 0;
    flex-shrink: 0;
  }
  .diff-info-badge.lines-added {
    color: #22c55e;
    border-color: rgba(34,197,94,0.3);
    background: rgba(34,197,94,0.12);
  }
  .diff-info-badge.lines-removed {
    color: #ef4444;
    border-color: rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.12);
  }
  .diff-info-badge.change-type {
    color: var(--accent);
    border-color: var(--border);
    background: var(--bg-tertiary);
  }
  .diff-files-list {
    list-style: none;
    padding: 0;
    margin: 4px 0 0;
  }
  .diff-files-list li {
    font-size: 11px;
    color: var(--text-muted);
    padding: 2px 0;
    font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
  }
  .diff-commit-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
   .diff-commit-hash {
    font-size: 11px;
    font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  /* ---- Code Review mode ---- */
  .diff-review-container {
    position: fixed;
    top: 52px; left: 0; right: 0; bottom: 0;
    display: none;
    z-index: 5;
  }
  .diff-review-container.visible { display: flex; }

  /* File tree sidebar */
  .diff-file-tree {
    width: 300px;
    min-width: 220px;
    max-width: 400px;
    flex-shrink: 0;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    padding: 12px 0;
    font-size: 14px;
    user-select: none;
  }
  .diff-file-tree-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    padding: 4px 14px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .diff-tree-dir {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px 3px 0;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .diff-tree-dir:hover { color: var(--text); }
  .diff-tree-chevron {
    display: inline-block;
    width: 14px;
    text-align: center;
    font-size: 10px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .diff-tree-dir.collapsed .diff-tree-chevron { transform: rotate(-90deg); }
  .diff-tree-dir-icon {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.5;
    flex-shrink: 0;
  }
  .diff-tree-dir.collapsed + .diff-tree-children { display: none; }
  .diff-tree-children {
    /* shown by default */
  }
  .diff-tree-file {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px 3px 0;
    cursor: pointer;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-left: 2px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }
  .diff-tree-file:hover { background: var(--bg-tertiary); }
  .diff-tree-file.active {
    background: color-mix(in srgb, var(--accent) 12%, var(--bg));
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  [data-theme="dark"] .diff-tree-file.active {
    background: rgba(139,233,253,0.08);
  }
  .diff-tree-icon {
    flex-shrink: 0;
    font-size: 13px;
    width: 16px;
    text-align: center;
    opacity: 0.6;
  }
  .diff-tree-badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 6px;
    margin-left: auto;
  }
  .diff-tree-badge.added { color: #7ec89a; background: rgba(126,200,154,0.1); }
  .diff-tree-badge.removed { color: #ff5555; background: rgba(255,85,85,0.1); }

  /* Content panel (right side) */
  .diff-review-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 60px;
    background: var(--bg);
  }
  .diff-review-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px;
  }
  .diff-review-header {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .diff-review-header h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .diff-review-header .diff-review-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .diff-review-header .diff-review-summary {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-top: 8px;
  }
  .diff-review-stats-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .diff-review-stats-bar .stat-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-weight: 500;
  }
  .diff-review-stats-bar .stat-chip.added { color: #7ec89a; border-color: rgba(126,200,154,0.3); background: rgba(126,200,154,0.08); }

  /* Light theme — Monokai-inspired syntax colors */

<script>
// =============================================================================
// ENGINE
// =============================================================================

const svg = d3.select('#graph');
const width = window.innerWidth;
const height = window.innerHeight - 48;

let selectedNode = null;
let simulation = null;

let currentNodes = [];      // live references to rendered nodes
let currentEdges = [];      // live references to rendered edges
let currentNodeSel = null;  // d3 selection for nodes
let currentLinkSel = null;  // d3 selection for links

// Active data — indirection layer so Detailed mode can swap in extended data
let activeNodes = classNodes;
let activeEdges = classEdges;
let detailedMode = false;
let detailedDataLoaded = false;

// Theme helpers — read CSS variables at runtime
function css(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

// Main group for zoom/pan
const container = svg.append('g');
const edgeGroup = container.append('g').attr('class', 'edges');
const nodeGroup = container.append('g').attr('class', 'nodes');

// Zoom behavior
const zoom = d3.zoom()
  .scaleExtent([0.15, 4])
  .on('zoom', (e) => container.attr('transform', e.transform));
svg.call(zoom);

// Arrow markers
const defs = svg.append('defs');

function createMarker(id, color) {
  defs.append('marker')
    .attr('id', id)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 10)
    .attr('refY', 0)
    .attr('markerWidth', 5)
    .attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L10,0L0,4')
    .attr('fill', color);
}

function rebuildMarkers() {
  defs.selectAll('marker').remove();
  createMarker('arrow-default', css('--edge-color'));
  createMarker('arrow-highlight', css('--edge-highlight'));
  Object.keys(DEP_TYPES).forEach(k => createMarker('arrow-dep-'+k, DEP_TYPES[k].color));
  createMarker('arrow-mutual', '#e53e3e');
}
rebuildMarkers();

// Glow filter
const glowFilter = defs.append('filter').attr('id', 'glow');
glowFilter.append('feGaussianBlur').attr('stdDeviation', 2.5).attr('result', 'blur');
glowFilter.append('feMerge').selectAll('feMergeNode')
  .data(['blur', 'SourceGraphic']).join('feMergeNode').attr('in', d => d);

const infoPanel = d3.select('#infoPanel');
const depDetailPanel = d3.select('#depDetailPanel');

// =============================================================================
// RENDER FUNCTIONS
// =============================================================================

function getNodeColor(node) {
  return LAYERS[node.layer]?.color || css('--text-muted');
}

// Edge visual weight helpers (global so analysis functions can access them)
function edgeStrokeWidth(s) {
  if (s <= 1) return 0.5;
  if (s <= 2) return 0.8;
  if (s <= 3) return 1.2;
  if (s <= 4) return 1.6;
  if (s <= 5) return 2.1;
  if (s <= 6) return 2.7;
  if (s <= 7) return 3.4;
  return 4.2;
}
function edgeDash(s, type) {
  if (type === 'raw-ptr' || type === 'pluggable' || type === 'method-param') {
    if (s <= 2) return '3,5';
    if (s <= 4) return '6,4';
    return '8,3';
  }
  if (s <= 1) return '2,5';
  if (s <= 2) return '4,4';
  if (s <= 3) return '8,3';
  if (s <= 4) return '12,3';
  return 'none';
}
function edgeOpacity(s) {
  return 0.15 + Math.min(s, 8) * 0.08;
}
function edgeColor(d) {
  if (d.mutual) return '#e53e3e';
  return DEP_TYPES[d.type]?.color || css('--edge-color');
}


function renderClassView() {
  edgeGroup.selectAll('*').remove();
  nodeGroup.selectAll('*').remove();
  if (simulation) simulation.stop();
  simulation = null;

  const nodes = activeNodes.map(d => ({...d, radius: 28}));
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

  // Deduplicate edges (keep highest strength for duplicates with same source->target)
  const edgeMap = {};
  activeEdges.forEach(([s,t,type,strength]) => {
    if (!nodeMap[s] || !nodeMap[t]) return;
    const key = s + '->' + t + '->' + type;
    if (!edgeMap[key] || edgeMap[key].strength < strength) {
      edgeMap[key] = { source: s, target: t, type, strength };
    }
  });
  const edges = Object.values(edgeMap);

  // Detect mutual (bidirectional) dependencies: A→B and B→A both exist
  const directedPairs = new Set();
  edges.forEach(e => directedPairs.add(e.source + '->' + e.target));
  edges.forEach(e => {
    e.mutual = directedPairs.has(e.target + '->' + e.source);
  });

  // Uniform node sizes
  nodes.forEach(n => {
    n.radius = 30;
    n.pillW = 72;
  });

  // --- LAYERED LAYOUT ---
  const cLayerOrder = ['storage','cluster','services','query','api'];
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - 48;

  // Tier Y positions: bottom = storage, top = api
  const usableH = svgH * 3;
  const tierCount = cLayerOrder.length;
  const tierSpacing = usableH / (tierCount + 1);
  const tierY = {};
  cLayerOrder.forEach((l, i) => {
    tierY[l] = usableH - tierSpacing * (i + 1);
  });

  // Group nodes by layer
  const layerGroups = {};
  cLayerOrder.forEach(l => { layerGroups[l] = []; });
  nodes.forEach(n => { if (layerGroups[n.layer]) layerGroups[n.layer].push(n); });

  // Sort nodes within each layer by connectivity (highest in center)
  const connectivity = {};
  edges.forEach(e => {
    connectivity[e.source] = (connectivity[e.source] || 0) + e.strength;
    connectivity[e.target] = (connectivity[e.target] || 0) + e.strength;
  });
  Object.keys(layerGroups).forEach(l => {
    const group = layerGroups[l];
    group.sort((a, b) => (connectivity[b.id] || 0) - (connectivity[a.id] || 0));
    const centered = [];
    group.forEach((n, i) => {
      if (i % 2 === 0) centered.push(n);
      else centered.unshift(n);
    });
    layerGroups[l] = centered;
  });

  // Assign X positions with adaptive spacing based on pill widths
  const usableW = svgW * 3;
  Object.keys(layerGroups).forEach(l => {
    const group = layerGroups[l];
    const count = group.length;
    if (count === 0) return;
    if (count === 1) { group[0].x = usableW / 2; group[0].y = tierY[group[0].layer]; group[0].tierY = tierY[group[0].layer]; return; }
    // Compute total span: sum of adjacent pill half-widths + gaps
    const gap = 20;
    let totalNeeded = 0;
    for (let i = 0; i < count - 1; i++) {
      totalNeeded += group[i].pillW + group[i + 1].pillW + gap;
    }
    // Scale down only if it exceeds usable width
    const sc = totalNeeded > usableW - 200 ? (usableW - 200) / totalNeeded : 1;
    const startX = (usableW - totalNeeded * sc) / 2;
    let xCursor = startX;
    group.forEach((n, i) => {
      if (i === 0) {
        n.x = xCursor;
      } else {
        xCursor += (group[i - 1].pillW + n.pillW + gap) * sc;
        n.x = xCursor;
      }
      n.y = tierY[n.layer];
      n.tierY = tierY[n.layer];
    });
  });

  // Draw tier background bands
  drawTierBands(cLayerOrder, tierY, usableW, tierSpacing);

  // Edges — 8-level visual weight based on usage count (strength 1-8)
  // Level 1-2: dotted, thin  |  3-4: dashed, medium  |  5-6: solid, medium  |  7-8: solid, bold
  const link = edgeGroup.selectAll('path')
    .data(edges)
    .join('path')
    .attr('fill', 'none')
    .attr('stroke', d => edgeColor(d))
    .attr('stroke-width', d => edgeStrokeWidth(d.strength))
    .attr('stroke-opacity', d => d.mutual ? 0.8 : edgeOpacity(d.strength))
    .attr('stroke-dasharray', d => edgeDash(d.strength, d.type))
    .attr('stroke-linecap', 'round')
    .attr('marker-end', d => d.mutual ? 'url(#arrow-mutual)' : 'url(#arrow-dep-' + d.type + ')');

  // Draw edges with bezier curves
  updateEdges(link, nodeMap);

  // Store global references for analysis functions
  currentNodes = nodes;
  currentEdges = edges;

  // Node groups
  const node = nodeGroup.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('cursor', 'pointer')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  // Store selections globally
  currentNodeSel = node;
  currentLinkSel = link;

  // Drag behavior (horizontal only in layered mode)
  node.call(d3.drag()
    .on('start', function(e, d) { d._dragging = true; })
    .on('drag', function(e, d) {
      d.x = e.x;
      d3.select(this).attr('transform', `translate(${d.x},${d.y})`);
      updateEdges(link, nodeMap);
    })
    .on('end', function(e, d) { d._dragging = false; })
  );

  // Node pill shape
  const cFillOp = parseFloat(css('--node-fill-opacity'));
  const cStrokeOp = parseFloat(css('--node-stroke-opacity'));
  const cTextShadow = css('--text-shadow-node');
  const cMuted = css('--text-muted');

  node.append('rect')
    .attr('x', d => -d.pillW)
    .attr('y', d => -d.radius * 0.65)
    .attr('width', d => d.pillW * 2)
    .attr('height', d => d.radius * 1.3)
    .attr('rx', d => d.radius * 0.45)
    .attr('fill', d => getNodeColor(d))
    .attr('fill-opacity', cFillOp)
    .attr('stroke', d => getNodeColor(d))
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', cStrokeOp)
    .style('filter', 'url(#glow)')
    .style('transition', 'fill-opacity 0.3s, stroke-opacity 0.3s');

  // Class name
  node.append('text')
    .text(d => d.id)
    .attr('text-anchor', 'middle')
    .attr('dy', '-0.1em')
    .attr('fill', d => getNodeColor(d))
    .attr('font-size', 11.5)
    .attr('font-weight', 600)
    .attr('pointer-events', 'none')
    .style('text-shadow', cTextShadow);

  // Namespace
  node.append('text')
    .text(d => d.ns)
    .attr('text-anchor', 'middle')
    .attr('dy', '1.15em')
    .attr('fill', cMuted)
    .attr('font-size', 10)
    .attr('pointer-events', 'none');

  // Auto-fit text to node width
  node.each(function(d) {
    const g = d3.select(this);
    const maxW = d.pillW * 2 - 12;
    g.selectAll('text').each(function() {
      const el = this;
      const len = el.getComputedTextLength();
      if (len > maxW) {
        const curSize = parseFloat(el.getAttribute('font-size'));
        el.setAttribute('font-size', curSize * maxW / len);
      }
    });
  });

  // Interactivity
  node.on('mouseover', (e, d) => {
    // When a node is selected, hovering another node shows its info in the right panel
    if (selectedNode) {
      if (d.id === selectedNode) return;
      // Normal mode: skip nodes not connected to the selected node
      var connectedToSel = false;
      edges.forEach(function(edge) {
        var sid = typeof edge.source === 'object' ? edge.source.id : edge.source;
        var tid = typeof edge.target === 'object' ? edge.target.id : edge.target;
        if ((sid === selectedNode && tid === d.id) || (tid === selectedNode && sid === d.id)) connectedToSel = true;
      });
      if (!connectedToSel) return;
      // Show dependency info in right detail panel (same as dep list hover)
      var hovEdge = null;
      edges.forEach(function(edge) {
        var sid = typeof edge.source === 'object' ? edge.source.id : edge.source;
        var tid = typeof edge.target === 'object' ? edge.target.id : edge.target;
        if ((sid === selectedNode && tid === d.id) || (tid === selectedNode && sid === d.id)) {
          if (!hovEdge || edge.strength > hovEdge.strength) hovEdge = edge;
        }
      });
      if (hovEdge) {
        // Blink the hovered node (only when we have dependency info to display)
        if (currentNodeSel) {
          currentNodeSel.classed('node-blink', false);
          currentNodeSel.filter(n => n.id === d.id).classed('node-blink', true);
        }
        var sid = typeof hovEdge.source === 'object' ? hovEdge.source.id : hovEdge.source;
        var tid = typeof hovEdge.target === 'object' ? hovEdge.target.id : hovEdge.target;
        var nodeMap = Object.fromEntries(activeNodes.map(function(n) { return [n.id, n]; }));
        var srcNode = nodeMap[sid];
        var tgtNode = nodeMap[tid];
        var depInfo = DEP_TYPES[hovEdge.type];
        var depColor = depInfo?.color || css('--text-muted');
        var srcLabel = sid;
        var tgtLabel = tid;
        var depKey = sid + '->' + tid + '->' + hovEdge.type;

        document.getElementById('depDetailDot').style.background = depColor;
        document.getElementById('depDetailTitle').textContent = srcLabel + ' \u2192 ' + tgtLabel;

        var bodyHtml = '';
        bodyHtml += '<span class="dep-detail-type" style="border:1px solid '+depColor+'">' + (depInfo?.label || hovEdge.type) + '</span>';
        bodyHtml += '<span class="dep-detail-strength">strength: ' + hovEdge.strength + '/8</span>';
        var desc = DEP_DESCRIPTIONS[depKey];
        if (desc) {
          bodyHtml += '<h3>How it\'s used</h3>';
          bodyHtml += '<p class="dep-desc-text">' + desc + '</p>';
        } else {
          bodyHtml += '<h3>Details</h3>';
          bodyHtml += '<p class="dep-desc-text" style="color:var(--text-muted);font-style:italic">No source-level description available for this dependency.</p>';
        }
        document.getElementById('depDetailBody').innerHTML = bodyHtml;
        depDetailPanel.classed('visible', true);
      }
      return;
    }
  }).on('mouseout', (e, d) => {
    if (selectedNode) {
      if (d.id === selectedNode) return;
      if (currentNodeSel) currentNodeSel.classed('node-blink', false);
      depDetailPanel.classed('visible', false);
      return;
    }
  }).on('click', (e, d) => {
    e.stopPropagation();
    // Stop any node blink animation
    if (currentNodeSel) currentNodeSel.classed('node-blink', false);

    // Normal click behavior
    if (selectedNode === d.id) { selectedNode = null; resetClassHighlight(node, link); hideInfoPanel(); return; }
    selectedNode = d.id;
    highlightClassNode(d, nodes, edges, node, link);
    showClassInfo(d, edges);
  });

  svg.on('click', () => {
    selectedNode = null;
    resetClassHighlight(node, link);
    hideInfoPanel();
  });

  // Auto-fit
  zoomToFit(nodes, 100);

  d3.select('#stats').text(nodes.length + ' classes, ' + edges.length + ' dependencies');
}

function drawTierBands(layerOrder, tierY, usableW, tierSpacing) {

  });
}

function updateEdges(linkSelection, nodeMap) {
  linkSelection.attr('d', d => {
    const src = typeof d.source === 'object' ? d.source : nodeMap[d.source];
    const tgt = typeof d.target === 'object' ? d.target : nodeMap[d.target];
    if (!src || !tgt) return '';
    const sx = src.x, sy = src.y;
    const tx = tgt.x, ty = tgt.y;
    const dy = ty - sy;
    const dx = tx - sx;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return '';

    // Offset start/end by node radius so edges start/end at boundary
    const srcR = src.pillW || src.radius || 20;
    const tgtR = tgt.pillW || tgt.radius || 20;

    // For same-tier edges, use a raised arc
    if (Math.abs(dy) < 10) {
      const arc = Math.max(40, Math.abs(dx) * 0.35);
      // Start and end from top of node
      const sy0 = sy - (src.radius || 20) * 0.6;
      const ty0 = ty - (tgt.radius || 20) * 0.6;
      return `M${sx},${sy0} C${sx},${sy0 - arc} ${tx},${ty0 - arc} ${tx},${ty0}`;
    }

    // Vertical direction: if target is below source, edge exits bottom and enters top
    const goingDown = dy > 0;
    const srcRy = (src.radius || 20) * 0.65;
    const tgtRy = (tgt.radius || 20) * 0.65;
    const sy0 = goingDown ? sy + srcRy : sy - srcRy;
    const ty0 = goingDown ? ty - tgtRy : ty + tgtRy;
    const effDy = ty0 - sy0;

    // Vertical bezier: control points at 40% of the vertical distance
    const cp = Math.abs(effDy) * 0.4;
    return `M${sx},${sy0} C${sx},${sy0 + Math.sign(effDy) * cp} ${tx},${ty0 - Math.sign(effDy) * cp} ${tx},${ty0}`;
  });
}


// =============================================================================
// ZOOM TO FIT
// =============================================================================

function zoomToFit(nodes, padding) {
  if (!nodes.length) return;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  nodes.forEach(n => {
    const r = (n.pillW || n.radius || 30) + 20;
    if (n.x - r < x0) x0 = n.x - r;
    if (n.y - r < y0) y0 = n.y - r;
    if (n.x + r > x1) x1 = n.x + r;
    if (n.y + r > y1) y1 = n.y + r;
  });
  const bw = x1 - x0;
  const bh = y1 - y0;
  if (bw <= 0 || bh <= 0) return;
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - 48;
  const scale = Math.min((svgW - padding * 2) / bw, (svgH - padding * 2) / bh, 1.5);
  const cx = (x0 + x1) / 2;
  const cy = (y0 + y1) / 2;
  const tx = svgW / 2 - cx * scale;
  const ty = svgH / 2 - cy * scale;
   svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function panToNode(d) {
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - 48;
  // Get current zoom scale, keep it (but clamp to a reasonable minimum)
  const curTransform = d3.zoomTransform(svg.node());
  const scale = Math.max(curTransform.k, 1.2);
  // Offset x to account for info panel (~300px on left)
  const panelOffset = infoPanel.classed('visible') ? 150 : 0;
  const tx = (svgW / 2 + panelOffset) - d.x * scale;
  const ty = svgH / 2 - d.y * scale;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function selectNode(nodeId) {
  if (!currentNodes || !currentEdges) return;
  const d = currentNodes.find(n => n.id === nodeId);
  if (!d) return;
  selectedNode = d.id;
  highlightClassNode(d, currentNodes, currentEdges, currentNodeSel, currentLinkSel);
  showClassInfo(d, currentEdges);
  panToNode(d);
}

function highlightClassNode(d, nodes, edges, nodeSelection, linkSelection) {
  const connected = new Set();
  connected.add(d.id);
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });

  nodeSelection.select('rect')
    .attr('fill-opacity', n => connected.has(n.id) ? 0.2 : 0.02)
    .attr('stroke-opacity', n => connected.has(n.id) ? 1 : 0.1)
    .attr('stroke-width', n => n.id === d.id ? 3 : connected.has(n.id) ? 2 : 1);
  nodeSelection.selectAll('text')
    .attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.1);

  linkSelection
    .attr('stroke-opacity', e => {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      if (sid === d.id || tid === d.id) return 0.85;
      return 0.03;
    });
}

function resetClassHighlight(nodeSelection, linkSelection) {
  const fillOp = parseFloat(css('--node-fill-opacity'));
  const strokeOp = parseFloat(css('--node-stroke-opacity'));
  nodeSelection.select('rect')
    .attr('fill-opacity', fillOp)
    .attr('stroke-opacity', strokeOp)
    .attr('stroke-width', 1.5);
  nodeSelection.selectAll('text').attr('fill-opacity', 1);
  linkSelection.attr('stroke-opacity', d => d.mutual ? 0.8 : (0.15 + Math.min(d.strength, 8) * 0.08));
}

    });

  d3.select('#infoBody').html(html);

    if (window.diffGraph && window.diffGraph.isActive()) {
      window.diffGraph.search('');
    } else {
      nodeGroup.selectAll('g').style('opacity', 1);
      edgeGroup.selectAll('path').style('opacity', 1);

  if (e.key === 'Enter') {
    const q = searchNorm(searchInputEl.value.trim());
    if (!q) return;

    if (window.diffGraph && window.diffGraph.isActive()) {
      const matched = window.diffGraph.searchSelect(q);

      searchInputEl.value = '';

      nodeGroup.selectAll('g').style('opacity', 1);

// WASD continuous pan
const _panKeys = {};
let _panRAF = null;
const _PAN_SPEED = 1680; // px per second at full speed
const _PAN_ACCEL = 0.14; // 0-1 easing per frame (higher = snappier start)
let _panVel = { x: 0, y: 0 };
let _panLastT = 0;

function _panLoop(t) {
  if (!_panLastT) _panLastT = t;
  const dt = Math.min((t - _panLastT) / 1000, 0.05); // cap at 50ms
  _panLastT = t;

  // Target direction from held keys
  let tx = 0, ty = 0;
  if (_panKeys['a']) tx += 1;
  if (_panKeys['d']) tx -= 1;
  if (_panKeys['w']) ty += 1;
  if (_panKeys['s']) ty -= 1;
  // Normalize diagonal
  if (tx && ty) { tx *= 0.7071; ty *= 0.7071; }

  const target = { x: tx * _PAN_SPEED, y: ty * _PAN_SPEED };
  // Ease toward target (fast attack, smooth stop)
  const mix = 1 - Math.pow(1 - _PAN_ACCEL, dt * 60);
  _panVel.x += (target.x - _panVel.x) * mix;
  _panVel.y += (target.y - _panVel.y) * mix;

  const speed = Math.sqrt(_panVel.x * _panVel.x + _panVel.y * _panVel.y);
  if (speed < 0.5 && !tx && !ty) {
    _panRAF = null; _panLastT = 0;
    _panVel.x = 0; _panVel.y = 0;
    return;
  }

  svg.call(zoom.translateBy, _panVel.x * dt, _panVel.y * dt);
  _panRAF = requestAnimationFrame(_panLoop);
}

document.addEventListener('keydown', (e) => {
  // Alt focuses search box from anywhere
  if (e.key === 'Alt') {
    e.preventDefault();
    searchInputEl.focus();
    searchInputEl.select();
    return;
  }

  // Skip keyboard shortcuts when typing in an input
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  // Q / E to switch between Architecture and Diff Analysis tabs
  const _k = e.key.toLowerCase();
  if (_k === 'q') { switchToArch(); return; }
  if (_k === 'e') { switchToDiff(); return; }

  if (e.key === 'Escape') {
    // If diff graph is active, let it handle its own Escape
    if (window.diffGraph && window.diffGraph.isActive()) return;
    selectedNode = null;
    hideInfoPanel();
    nodeGroup.selectAll('g').style('opacity', 1);
    edgeGroup.selectAll('path').style('opacity', 1);
    document.getElementById('searchInput').value = '';
    document.querySelector('.search-box').classList.remove('has-value');
    if (currentNodeSel && currentLinkSel) {
      resetClassHighlight(currentNodeSel, currentLinkSel);
      currentLinkSel.attr('stroke', d => edgeColor(d))
        .attr('stroke-width', d => edgeStrokeWidth(d.strength));
      currentNodeSel.select('rect').attr('stroke', d => getNodeColor(d));
    }
  }

  const key = e.key.toLowerCase();
  if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
    e.preventDefault();
    if (!_panKeys[key]) {
      _panKeys[key] = true;
      // Kick velocity for instant response on first press
      if (key === 'a') _panVel.x = Math.max(_panVel.x, _PAN_SPEED * 0.5);
      if (key === 'd') _panVel.x = Math.min(_panVel.x, -_PAN_SPEED * 0.5);
      if (key === 'w') _panVel.y = Math.max(_panVel.y, _PAN_SPEED * 0.5);
      if (key === 's') _panVel.y = Math.min(_panVel.y, -_PAN_SPEED * 0.5);
    }
    if (!_panRAF) { _panLastT = 0; _panRAF = requestAnimationFrame(_panLoop); }
  }
});

document.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  delete _panKeys[key];
});

});

// Handle resize
window.addEventListener('resize', () => {
  if (window.diffGraph && window.diffGraph.isActive()) return; // diff-graph handles its own resize
  selectedNode = null;
  hideInfoPanel();
  renderClassView();
});

// Detailed view toggle
const btnDetailed = document.getElementById('btnDetailed');
btnDetailed.addEventListener('click', () => {
  function applyDetailedToggle() {
    detailedMode = !detailedMode;
    if (detailedMode) {
      // Merge base + detailed data (dedup nodes by id)
      const baseIds = new Set(classNodes.map(n => n.id));
      const extraNodes = (typeof detailedClassNodes !== 'undefined' ? detailedClassNodes : [])
        .filter(n => !baseIds.has(n.id));
      activeNodes = classNodes.concat(extraNodes);
      activeEdges = classEdges.concat(typeof detailedClassEdges !== 'undefined' ? detailedClassEdges : []);
      // Merge detailed dependency descriptions into DEP_DESCRIPTIONS
      if (typeof detailedDepDescriptions !== 'undefined') {
        Object.assign(DEP_DESCRIPTIONS, detailedDepDescriptions);
      }
      btnDetailed.classList.add('active');
    } else {
      activeNodes = classNodes;
      activeEdges = classEdges;
      // Remove detailed dependency descriptions from DEP_DESCRIPTIONS
      if (typeof detailedDepDescriptions !== 'undefined') {
        Object.keys(detailedDepDescriptions).forEach(k => delete DEP_DESCRIPTIONS[k]);
      }
      btnDetailed.classList.remove('active');
    }
    selectedNode = null;
    hideInfoPanel();
    renderClassView();
  }

  if (!detailedDataLoaded) {
    // Dynamically load the detailed data script
    const script = document.createElement('script');
    script.src = 'data/arch-detailed-nodes.js';
    script.onload = () => {
      detailedDataLoaded = true;
      applyDetailedToggle();
    };
    script.onerror = () => {
      btnDetailed.textContent = 'Detailed (error)';
      console.error('Failed to load data/arch-detailed-nodes.js');
    };
    document.head.appendChild(script);
  } else {
    applyDetailedToggle();
  }
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  if (isDark) {
    delete html.dataset.theme;
    document.getElementById('themeToggle').innerHTML = '&#9790;'; // crescent moon
  } else {
    html.dataset.theme = 'dark';
    document.getElementById('themeToggle').innerHTML = '&#9788;'; // sun
  }
  rebuildMarkers();
  selectedNode = null;
  hideInfoPanel();
  if (window.diffGraph && window.diffGraph.isActive()) {
    window.diffGraph.render();
  } else {
    renderClassView();
  }
});

// Initial render
renderClassView();

// =============================================================================
// VIEW TAB SWITCHING (Architecture <-> Diff Analysis)
// =============================================================================

const _tabArch = document.getElementById('tabArch');
const _tabDiff = document.getElementById('tabDiff');
const _archToolbar = document.getElementById('archToolbar');
const _diffToolbar = document.getElementById('diffToolbar');

function switchToArch() {
  _tabArch.classList.add('active');
  _tabDiff.classList.remove('active');
  // Show arch SVG, hide diff SVG
  document.getElementById('graph').style.display = '';
  // Deactivate diff graph
  if (window.diffGraph) window.diffGraph.deactivate();
  // Swap toolbars
  _archToolbar.style.display = '';
  _diffToolbar.style.display = 'none';
  // Reset arch state
  selectedNode = null;
  hideInfoPanel();
  renderClassView();
}

function switchToDiff() {
  _tabDiff.classList.add('active');
  _tabArch.classList.remove('active');
  // Hide arch SVG
  document.getElementById('graph').style.display = 'none';
  // Swap toolbars
  _archToolbar.style.display = 'none';
  _diffToolbar.style.display = '';
  // Reset arch state
  selectedNode = null;
  hideInfoPanel();
  // Activate diff graph
  if (window.diffGraph) window.diffGraph.activate();
}

_tabArch.addEventListener('click', switchToArch);
_tabDiff.addEventListener('click', switchToDiff);

// Diff level buttons (segmented group)
document.querySelectorAll('#diffToolbar .view-tab[data-level]').forEach(btn => {
  btn.addEventListener('click', () => {
    const level = btn.getAttribute('data-level');
    if (level && window.diffGraph) {
      // Update active state in the segmented group
      document.querySelectorAll('#diffToolbar .view-tab[data-level]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window.diffGraph.switchLevel(level);
    }
  });
});

</script>
<script src="data/diff-nodes.js"></script>
<script src="data/diff-raw.js"></script>
<script src="data/diff-graph.js"></script>
</body>
